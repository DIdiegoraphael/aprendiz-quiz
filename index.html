<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Aprendiz Quiz · Imergir</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet"/>
<style>
/* --- Identidade Visual Azul & Ouro --- */
*{box-sizing:border-box;margin:0;padding:0}
body{
    font-family:'Nunito',sans-serif;
    background: radial-gradient(circle at 50% 50%, #1a2a6c, #101a43, #050a1d);
    color:#fff;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
    overflow-x:hidden;
}

.screen{display:none;width:100%;max-width:800px;text-align:center;animation:fadeUp .5s ease-out}
.screen.active{display:block}
.orb{font-family:'Orbitron',monospace;font-weight:900}

/* Botões Estilo Kahoot Premium */
.btn{cursor:pointer;border:none;border-radius:14px;font-family:'Nunito',sans-serif;font-weight:900;font-size:16px;padding:16px 30px;transition:all .2s;color:#fff;display:inline-flex;align-items:center;justify-content:center;gap:10px}
.btn:hover:not(:disabled){transform:translateY(-3px);box-shadow: 0 10px 20px rgba(0,0,0,0.3)}
.btn-gold{background: linear-gradient(135deg,#d4af37, #f1c40f); color:#1a1a2e}
.btn-blue{background: linear-gradient(135deg,#1e40af, #3b82f6)}

/* Campo Central de Anexo */
.upload-container{
    background: rgba(255,255,255,0.05);
    border: 2px dashed #FFD700;
    border-radius: 30px;
    padding: 60px 40px;
    margin-bottom: 20px;
    transition: 0.3s;
}
.upload-container:hover{background: rgba(255,255,255,0.08)}

/* QR Code & Lobby */
.qr-box{background:#fff; padding:15px; border-radius:20px; display:inline-block; margin:20px 0}
.room-code{font-size:45px; color:#FFD700; letter-spacing:5px; margin:10px 0}

/* Quiz UI */
.options-grid{display:grid; grid-template-columns: 1fr 1fr; gap:15px; margin-top:20px}
.opt{padding:20px; border-radius:15px; font-weight:800; text-align:left; cursor:pointer; display:flex; align-items:center; gap:15px; font-size:18px; border:none; color:#fff}
.timer-bar{width:100%; height:10px; background:rgba(255,255,255,0.1); border-radius:5px; margin:20px 0; overflow:hidden}
.timer-fill{height:100%; background:#FFD700; width:100%; transition: width 1s linear}

/* Pódio Lego Olímpico */
.podium-area{display:flex; align-items:flex-end; justify-content:center; gap:10px; height:350px; margin-top:40px}
.place{width:150px; position:relative; display:flex; flex-direction:column; align-items:center}
.lego-avatar{width:80px; height:100px; margin-bottom:10px; transition: 0.5s}
.block{width:100%; border-radius:10px 10px 0 0; display:flex; align-items:center; justify-content:center; font-size:40px; font-weight:900; color:rgba(0,0,0,0.3)}

.first .block {height:180px; background: linear-gradient(#FFD700, #B8860B)}
.second .block {height:140px; background: linear-gradient(#C0C0C0, #707070)}
.third .block {height:100px; background: linear-gradient(#CD7F32, #8B4513)}

@keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<div id="screen-instructor" class="screen active">
    <h1 class="orb" style="color:#FFD700; font-size:42px; margin-bottom:10px">Aprendiz Quiz</h1>
    <p style="margin-bottom:40px; opacity:0.8">Prepare sua aula para a fase <b>IMERGIR</b></p>
    
    <div class="upload-container">
        <div id="upload-icon" style="font-size:50px; margin-bottom:15px">📂</div>
        <p style="font-weight:800; font-size:20px">Arraste ou anexe sua apresentação</p>
        <p style="font-size:14px; opacity:0.5; margin-top:5px">Formatos aceitos: PDF ou PPTX</p>
        <input type="file" id="fileInput" style="margin-top:30px">
    </div>
    
    <button class="btn btn-gold" id="btnCreate" disabled onclick="processAI()">✨ CRIAR PERGUNTAS COM IA</button>
</div>

<div id="screen-lobby" class="screen">
    <h2 class="orb" style="color:#FFD700">SALA PRONTA!</h2>
    <p>Peça para os alunos escanearem o código abaixo</p>
    <div class="qr-box"><canvas id="qrcode"></canvas></div>
    <div class="room-code orb" id="roomCode">000 000</div>
    <div id="playerList" style="margin:20px 0; min-height:40px">Aguardando participantes...</div>
    <button class="btn btn-blue" onclick="startQuiz()">🎯 INICIAR QUIZZ</button>
</div>

<div id="screen-quiz" class="screen">
    <div id="timerDisplay" class="orb" style="font-size:30px; color:#FFD700">30</div>
    <div class="timer-bar"><div id="timerFill" class="timer-fill"></div></div>
    <h2 id="questionText" style="font-size:26px; margin:20px 0"></h2>
    <div class="options-grid" id="optionsGrid"></div>
</div>

<div id="screen-podium" class="screen">
    <h1 class="orb" style="color:#FFD700">PÓDIO FINAL</h1>
    <div class="podium-area">
        <div class="place second">
            <div class="lego-avatar">🥈</div>
            <div id="p2-name" style="font-size:12px">--</div>
            <div class="block">2</div>
        </div>
        <div class="place first">
            <div class="lego-avatar" style="font-size:50px">🏆<br>🥇</div>
            <div id="p1-name" style="font-weight:bold">--</div>
            <div class="block">1</div>
        </div>
        <div class="place third">
            <div class="lego-avatar">🥉</div>
            <div id="p3-name" style="font-size:12px">--</div>
            <div class="block">3</div>
        </div>
    </div>
    <button class="btn btn-gold" style="margin-top:40px" onclick="location.reload()">🔄 NOVA AULA</button>
</div>

<script>
let quizData = [];
let currentQ = 0;
let players = [];
let timer;

document.getElementById('fileInput').addEventListener('change', function() {
    document.getElementById('btnCreate').disabled = false;
    document.getElementById('upload-icon').textContent = "📄";
});

// SIMULAÇÃO DA IA CRIANDO PERGUNTAS A PARTIR DO SLIDE
function processAI() {
    const btn = document.getElementById('btnCreate');
    btn.innerHTML = "🤖 AGENTE IA ANALISANDO SLIDES...";
    btn.disabled = true;

    setTimeout(() => {
        // Aqui a IA geraria as questões baseadas no conteúdo real
        quizData = [
            {q: "Qual o foco principal da fase IMERGIR?", opts: ["Execução rápida", "Empatia e Contexto", "Finalização", "Vendas"], a: 1},
            {q: "O que define um Aprendiz Protagonista?", opts: ["Esperar ordens", "Reclamar do erro", "Assumir a liderança", "Trabalhar isolado"], a: 2}
            // ... (geraria 10 perguntas)
        ];
        showLobby();
    }, 2000);
}

function showLobby() {
    document.getElementById('screen-instructor').classList.remove('active');
    document.getElementById('screen-lobby').classList.add('active');
    document.getElementById('roomCode').textContent = Math.floor(100000 + Math.random() * 900000);
    drawQR();
}

function drawQR() {
    const canvas = document.getElementById('qrcode');
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = "#101a43";
    for(let i=0; i<20; i++) {
        for(let j=0; j<20; j++) {
            if(Math.random() > 0.6) ctx.fillRect(i*8, j*8, 6, 6);
        }
    }
}

function startQuiz() {
    document.getElementById('screen-lobby').classList.remove('active');
    document.getElementById('screen-quiz').classList.add('active');
    showQuestion();
}

function showQuestion() {
    if(currentQ >= quizData.length) { showPodium(); return; }
    
    const q = quizData[currentQ];
    document.getElementById('questionText').textContent = q.q;
    const grid = document.getElementById('optionsGrid');
    grid.innerHTML = '';
    
    const colors = ['#e21b3c', '#1368ce', '#d89e00', '#26890c'];
    q.opts.forEach((opt, i) => {
        grid.innerHTML += `<button class="opt" style="background:${colors[i]}" onclick="nextQ()">${opt}</button>`;
    });

    startTimer();
}

function startTimer() {
    let sec = 30;
    const bar = document.getElementById('timerFill');
    const text = document.getElementById('timerDisplay');
    bar.style.width = "100%";
    
    clearInterval(timer);
    timer = setInterval(() => {
        sec--;
        text.textContent = sec;
        bar.style.width = (sec/30)*100 + "%";
        if(sec <= 0) nextQ();
    }, 1000);
}

function nextQ() {
    currentQ++;
    showQuestion();
}

function showPodium() {
    document.getElementById('screen-quiz').classList.remove('active');
    document.getElementById('screen-podium').classList.add('active');
    // Simulação de nomes para o ranking
    document.getElementById('p1-name').textContent = "Vencedor Protagonista";
    document.getElementById('p2-name').textContent = "Aprendiz 2";
    document.getElementById('p3-name').textContent = "Aprendiz 3";
}

</script>
</body>
</html>
