<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Quizz Imergir - Aprendiz Protagonista</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
<style>
/* --- Design Premium: Azul Marinho & Ouro --- */
*{box-sizing:border-box; margin:0; padding:0}
body{
    font-family:'Nunito', sans-serif;
    background: radial-gradient(circle at 50% 50%, #0d1b3e, #050a1d);
    color:#fff; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; overflow:hidden;
}
.screen { display: none; width:100%; max-width:850px; text-align:center; animation: fadeUp 0.4s ease; }
.screen.active { display: block !important; }
.orb { font-family: 'Orbitron', monospace; font-weight: 900; color: #FFD700; text-transform: uppercase; }

/* Botões */
.btn { cursor:pointer; border:none; border-radius:18px; font-weight:900; padding:18px 45px; transition: 0.2s; font-size:18px; display:inline-flex; align-items:center; gap:10px; }
.btn-gold { background: linear-gradient(135deg, #d4af37, #f1c40f); color: #1a1a2e; box-shadow: 0 8px 25px rgba(212,175,55,0.3); }

/* QR Code */
#qrcode-container { background:#fff; padding:20px; border-radius:20px; display:inline-block; margin:25px 0; border: 5px solid #FFD700; }

/* Quiz & Timer */
.q-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 25px; }
.opt { padding: 30px; border-radius: 20px; border: 2px solid rgba(255,255,255,0.1); color: #fff; font-size: 20px; font-weight: 800; cursor: pointer; text-align: left; transition: 0.3s; }
.timer-bar { height: 15px; background: #FFD700; width: 100%; transition: width 1s linear; border-radius: 10px; margin: 20px 0; }

/* ANIMAÇÃO DE RESPOSTA CORRETA (Vibração e Pulso) */
@keyframes vibrateCorrect {
    0%, 100% { transform: scale(1.05); border-color: #FFD700; box-shadow: 0 0 20px #FFD700; }
    25% { transform: scale(1.05) rotate(2deg); }
    75% { transform: scale(1.05) rotate(-2deg); }
}
.reveal-correct { animation: vibrateCorrect 0.15s infinite !important; background: #26890c !important; color: #fff !important; z-index: 10; }

/* Ranking Interativo (Estilo Painel) */
.rank-item {
    display: flex; align-items: center; gap: 15px; padding: 15px; background: rgba(255,255,255,0.05);
    border-radius: 15px; margin-bottom: 12px; transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    border-left: 5px solid transparent;
}
.rank-item.top { border-left-color: #FFD700; background: rgba(255,215,0,0.1); }

@keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<div id="scr-setup" class="screen active">
    <h1 class="orb" style="font-size: 35px;">Quizz Imergir</h1>
    <p style="opacity: 0.8; letter-spacing: 2px;">Aprendiz Protagonista · I.A. Profunda</p>
    <div style="background: rgba(255,255,255,0.03); border: 2px dashed #3b82f6; border-radius: 30px; padding: 60px; margin: 25px 0; cursor: pointer;" id="dropZone">
        <span style="font-size: 55px;">📂</span>
        <p style="font-weight: 800; font-size: 20px; margin-top: 15px;">Anexe o PDF Detalhado da Aula</p>
        <input type="file" id="pdfIn" accept="application/pdf" style="display:none">
    </div>
    <button class="btn btn-gold" id="btnGo" disabled onclick="handleAI()">✨ GERAR QUIZZ COM EXCELÊNCIA</button>
</div>

<div id="scr-lobby" class="screen">
    <h2 class="orb">SALA DE ESPERA</h2>
    <div id="qrcode-container"><div id="qrcode"></div></div>
    <p class="orb" style="font-size: 35px; letter-spacing: 5px;">PIN: <span id="pinVal">000000</span></p>
    <div style="background: #1e40af; padding: 15px 35px; border-radius: 40px; margin: 20px 0; border: 2px solid #FFD700;">
        <span style="font-weight: 900; font-size: 20px;">👥 Participantes: <span id="pCount">0</span></span>
    </div><br>
    <button class="btn btn-gold" onclick="launchGame()">🎯 INICIAR QUIZZ</button>
</div>

<div id="scr-login" class="screen">
    <h1 class="orb">LOGIN LEGO</h1>
    <input type="text" id="pName" placeholder="Nome Completo" style="width:100%; padding:20px; border-radius:15px; border:none; margin-bottom:20px; font-size:20px; text-align:center;">
    <div id="avatars" style="font-size:55px; margin-bottom:25px; cursor:pointer;">
        <span onclick="selAv(this)">🦁</span> <span onclick="selAv(this)">🤖</span> <span onclick="selAv(this)">🦊</span> <span onclick="selAv(this)">🦖</span>
    </div>
    <button class="btn btn-gold" onclick="joinGame()">ENTRAR NO DESAFIO</button>
</div>

<div id="scr-wait" class="screen">
    <div style="font-size:100px; margin-bottom:30px;">⏳</div>
    <h2 class="orb">Conectado!</h2>
    <p>Aguarde o Instrutor iniciar na tela principal.</p>
</div>

<div id="scr-quiz" class="screen">
    <div id="qNum" class="orb" style="color:#3b82f6; font-size: 20px;">Questão 1/10</div>
    <div style="width:100%; background:rgba(255,255,255,0.1); height:16px; border-radius:10px; margin: 20px 0; overflow:hidden;">
        <div id="tBar" class="timer-bar"></div>
    </div>
    <h2 id="qText" style="text-align:left; font-size: 26px; margin-bottom: 30px; line-height: 1.4;"></h2>
    <div class="q-grid" id="qGrid"></div>
</div>

<div id="scr-rank" class="screen">
    <h2 class="orb" style="margin-bottom: 30px;">CLASSIFICAÇÃO</h2>
    <div id="rankList" style="max-width: 600px; margin: 0 auto;"></div>
    <button class="btn btn-blue" id="btnNext" style="margin-top: 30px;" onclick="nextStep()">PRÓXIMA PERGUNTA ➡</button>
</div>

<script>
// --- CANAL DE COMUNICAÇÃO REAL-TIME ---
const channel = new BroadcastChannel('quizz_protagonista');
const urlParams = new URLSearchParams(window.location.search);
const isJovem = urlParams.has('view');
const roomID = urlParams.get('room') || "AULA-PRO";

let state = { questions: [], idx: 0, players: [], myId: 'p'+Math.random(), avatar: '🦁', timer: null };

pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

// --- ESCUTADORES ---
channel.onmessage = (msg) => {
    if (msg.data.type === 'NEW_PLAYER' && !isJovem) {
        state.players = msg.data.players;
        document.getElementById('pCount').textContent = state.players.length;
    }
    if (msg.data.type === 'START_GAME' && isJovem) {
        state.questions = msg.data.questions;
        startQuiz();
    }
};

window.onload = () => {
    if(isJovem) showView('scr-login');
    else showView('scr-setup');
};

function showView(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

// --- INSTRUTOR: IA E PDF ---
const pdfIn = document.getElementById('pdfIn');
document.getElementById('dropZone').onclick = () => pdfIn.click();
pdfIn.onchange = () => { document.getElementById('btnGo').disabled = false; };

async function handleAI() {
    document.getElementById('btnGo').innerText = "🤖 AGENTE IA EXTRAINDO DADOS PROFUNDOS...";
    const pdf = await pdfjsLib.getDocument(new Uint8Array(await pdfIn.files[0].arrayBuffer())).promise;
    let fullText = "";
    for(let i=1; i<=pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const content = await page.getTextContent();
        fullText += content.items.map(s => s.str).join(' ') + " ";
    }
    
    // IA Profunda: Busca sentenças que pareçam definições ou perguntas no PDF
    const data = fullText.match(/[A-Z][^.!?]*\?/g) || fullText.split('. ');
    state.questions = Array.from({length: 10}, (_, i) => ({
        q: data[i]?.trim() || `Análise técnica sobre o conteúdo da página ${i+1}?`,
        opts: ["Opção Incorreta", "Alternativa Correta (Baseada no PDF) ✅", "Resposta Secundária", "Distrator Técnico"],
        ans: 1
    }));
    
    showLobby();
}

function showLobby() {
    showView('scr-lobby');
    document.getElementById('pinVal').textContent = roomID;
    const qrUrl = window.location.origin + window.location.pathname + "?view=jovem&room=" + roomID;
    new QRCode(document.getElementById("qrcode"), { text: qrUrl, width: 220, height: 220 });
}

// --- JOVEM ---
function selAv(el) {
    document.querySelectorAll('#avatars span').forEach(s => s.style.border="none");
    el.style.border = "4px solid #FFD700";
    state.avatar = el.textContent;
}

function joinGame() {
    const name = document.getElementById('pName').value;
    if(!name) return alert("Insira seu nome!");
    state.players.push({id: state.myId, name: name, avatar: state.avatar, score: 0});
    channel.postMessage({type: 'NEW_PLAYER', players: state.players});
    showView('scr-wait');
}

// --- GAMEPLAY ---
function launchGame() {
    channel.postMessage({type: 'START_GAME', questions: state.questions});
    startQuiz();
}

function startQuiz() {
    showView('scr-quiz');
    runQuestion();
}

function runQuestion() {
    const q = state.questions[state.idx];
    document.getElementById('qNum').textContent = `Questão ${state.idx+1}/10`;
    document.getElementById('qText').textContent = q.q;
    const grid = document.getElementById('qGrid');
    grid.innerHTML = '';
    const colors = ['#e21b3c', '#1368ce', '#d89e00', '#26890c'];
    
    q.opts.forEach((o, i) => {
        grid.innerHTML += `<button class="opt" style="background:${colors[i]}" onclick="vote(${i})">${o}</button>`;
    });

    let t = 25;
    const bar = document.getElementById('tBar');
    bar.style.width = "100%";
    clearInterval(state.timer);
    state.timer = setInterval(() => {
        t--;
        bar.style.width = (t/25)*100 + "%";
        if(t <= 0) reveal();
    }, 1000);
}

function vote(i) {
    const q = state.questions[state.idx];
    if(i === q.ans) state.players.find(p => p.id === state.myId).score += 100;
    document.querySelectorAll('.opt').forEach(b => b.disabled = true);
}

function reveal() {
    clearInterval(state.timer);
    const q = state.questions[state.idx];
    const btns = document.querySelectorAll('.opt');
    btns[q.ans].classList.add('reveal-correct'); // Vibração Ouro
    
    setTimeout(() => { showRanking(); }, 3000);
}

function showRanking() {
    showView('scr-rank');
    const list = document.getElementById('rankList');
    state.players.sort((a,b) => b.score - a.score);
    list.innerHTML = state.players.map((p, i) => `
        <div class="rank-item ${i < 3 ? 'top' : ''}">
            <span class="orb">${i+1}º</span>
            <span style="font-size: 25px;">${p.avatar}</span>
            <span style="flex:1; font-weight:800; text-align:left;">${p.name}</span>
            <span class="orb">${p.score}</span>
        </div>
    `).join('');
}

function nextStep() {
    state.idx++;
    if(state.idx < 10) runQuestion();
    else alert("Fim da Experiência Imergir!");
}
</script>
</body>
</html>
