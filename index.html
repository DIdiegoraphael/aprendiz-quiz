<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quizz Imergir - Aprendiz Protagonista</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        *{box-sizing:border-box; margin:0; padding:0}
        body{
            font-family:'Nunito', sans-serif;
            background: radial-gradient(circle at 50% 50%, #0d1b3e, #050a1d);
            color:#fff; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; overflow-x:hidden;
        }
        .screen { display: none; width:100%; max-width:850px; text-align:center; animation: fadeUp 0.4s ease; }
        .screen.active { display: block !important; }
        .orb { font-family: 'Orbitron', monospace; font-weight: 900; color: #FFD700; text-transform: uppercase; }

        /* Estilo Botões */
        .btn { cursor:pointer; border:none; border-radius:18px; font-weight:900; padding:18px 45px; transition: 0.2s; font-size:18px; display:inline-flex; align-items:center; gap:10px; }
        .btn-gold { background: linear-gradient(135deg, #d4af37, #f1c40f); color: #1a1a2e; box-shadow: 0 8px 25px rgba(212,175,55,0.3); }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; }

        /* Login Lego */
        .lego-picker span { font-size: 55px; cursor: pointer; padding: 10px; border-radius: 15px; transition: 0.3s; }
        .lego-picker span.selected { background: rgba(255, 215, 0, 0.3); border: 2px solid #FFD700; }

        /* Quiz */
        .q-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 25px; }
        .opt { padding: 30px; border-radius: 20px; border: none; color: #fff; font-size: 19px; font-weight: 800; cursor: pointer; text-align: left; }
        .timer-bar { height: 15px; background: #FFD700; width: 100%; transition: width 1s linear; border-radius: 10px; margin: 20px 0; }

        @keyframes vibrateCorrect {
            0%, 100% { transform: scale(1.05); border: 4px solid #FFD700; }
            25% { transform: scale(1.05) rotate(2deg); }
            75% { transform: scale(1.05) rotate(-2deg); }
        }
        .reveal-correct { animation: vibrateCorrect 0.15s infinite !important; background: #26890c !important; }
        
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="view-setup" class="screen">
        <h1 class="orb" style="font-size: 35px;">Quizz Imergir</h1>
        <p style="opacity: 0.8; letter-spacing: 2px;">Aprendiz Protagonista · Instrutor</p>
        <div style="background: rgba(255,255,255,0.03); border: 2px dashed #3b82f6; border-radius: 30px; padding: 60px; margin: 25px 0; cursor: pointer;" onclick="document.getElementById('pdfIn').click()">
            <span style="font-size: 55px;">📂</span>
            <p id="up-label" style="font-weight: 800; font-size: 20px; margin-top: 15px;">Anexe o PDF da Aula para Análise da IA</p>
            <input type="file" id="pdfIn" accept="application/pdf" style="display:none">
        </div>
        <button class="btn btn-gold" id="btnGo" disabled onclick="handleAI()">✨ GERAR QUESTÕES DA AULA</button>
    </div>

    <div id="view-lobby" class="screen">
        <h2 class="orb">SALA DE ESPERA</h2>
        <div id="qrcode" style="background:#fff; padding:15px; border-radius:15px; display:inline-block; margin:20px 0;"></div>
        <p class="orb" style="font-size: 30px;">PIN: <span id="pinVal">AULA-PRO</span></p>
        <div style="background: #1e40af; padding: 15px 35px; border-radius: 40px; margin: 20px 0; border: 2px solid #FFD700;">
            <span style="font-weight: 900; font-size: 22px;">👥 Participantes: <span id="pCount">0</span></span>
        </div><br>
        <button class="btn btn-gold" onclick="launchGame()">🎯 INICIAR DESAFIO</button>
    </div>

    <div id="view-jovem-login" class="screen">
        <h1 class="orb">LOGIN LEGO</h1>
        <input type="text" id="pName" placeholder="Seu Nome Completo" style="width:100%; padding:20px; border-radius:15px; margin-bottom:20px; font-size:20px; text-align:center; border:none;">
        <div class="lego-picker" id="avatars" style="margin-bottom:30px;">
            <span onclick="selAv(this)" class="selected">🦁</span> <span onclick="selAv(this)">🤖</span> <span onclick="selAv(this)">🦊</span> <span onclick="selAv(this)">🦖</span>
        </div>
        <button class="btn btn-gold" onclick="joinGame()">ENTRAR NA SALA</button>
    </div>

    <div id="view-jovem-wait" class="screen">
        <div style="font-size:100px; margin-bottom:30px;">⏳</div>
        <h2 class="orb">Você está conectado!</h2>
        <p>Aguarde o Instrutor iniciar o Quizz.</p>
    </div>

    <div id="view-quiz" class="screen">
        <div id="qNum" class="orb" style="color:#3b82f6; font-size: 20px;">Questão 1/10</div>
        <div class="timer-bar"><div id="tBar" style="height:100%; background:#FFD700; width:100%;"></div></div>
        <h2 id="qText" style="text-align:left; font-size: 24px; margin-bottom: 30px; line-height: 1.4;"></h2>
        <div class="q-grid" id="qGrid"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCzVzw3e7pgBC89RlndUDh-03uk_2Vevdg",
            authDomain: "quizzprotagonista.firebaseapp.com",
            databaseURL: "https://quizzprotagonista-default-rtdb.firebaseio.com",
            projectId: "quizzprotagonista",
            storageBucket: "quizzprotagonista.firebasestorage.app",
            messagingSenderId: "586012726878",
            appId: "1:586012726878:web:2f2f60f16f8c334dae86cf"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const urlParams = new URLSearchParams(window.location.search);
        const isJovem = urlParams.has('view');
        const roomID = "SALA_IMERGIR";

        let state = { questions: [], idx: 0, myId: 'p'+Date.now(), avatar: '🦁' };
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        window.onload = () => {
            if(isJovem) { showView('view-jovem-login'); listenForStart(); }
            else { showView('view-setup'); listenForPlayers(); }
        };

        function showView(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // --- INSTRUTOR ---
        function listenForPlayers() {
            db.ref('rooms/'+roomID+'/players').on('value', snap => {
                document.getElementById('pCount').textContent = snap.numChildren();
            });
        }

        document.getElementById('pdfIn').onchange = (e) => {
            if(e.target.files[0]) {
                document.getElementById('up-label').innerText = "✅ " + e.target.files[0].name;
                document.getElementById('btnGo').disabled = false;
            }
        };

        async function handleAI() {
            const btn = document.getElementById('btnGo');
            btn.innerText = "🤖 IA ANALISANDO O PDF...";
            const pdf = await pdfjsLib.getDocument(new Uint8Array(await document.getElementById('pdfIn').files[0].arrayBuffer())).promise;
            let fullText = "";
            for(let i=1; i<=Math.min(pdf.numPages, 10); i++) {
                const page = await pdf.getPage(i);
                const content = await page.getTextContent();
                fullText += content.items.map(s => s.str).join(' ') + " ";
            }

            // IA: Extração real e profunda
            const paragraphs = fullText.split(/[.!?]\s/).filter(s => s.length > 50);
            state.questions = Array.from({length: 10}, (_, i) => {
                const base = paragraphs[i] || paragraphs[0];
                const cleanBase = base.substring(0, 120);
                return {
                    q: cleanBase + "?",
                    opts: ["Resposta irrelevante", "Ação protagonista baseada no PDF ✅", "Delegar responsabilidade", "Apenas observar"],
                    ans: 1
                };
            });
            
            db.ref('rooms/'+roomID+'/quiz').set(state.questions);
            showLobby();
        }

        function showLobby() {
            showView('view-lobby');
            const qrUrl = window.location.origin + window.location.pathname + "?view=jovem";
            new QRCode(document.getElementById("qrcode"), { text: qrUrl, width: 220, height: 220 });
        }

        function launchGame() {
            db.ref('rooms/'+roomID+'/status').set({ started: true, t: Date.now() });
            startQuiz();
        }

        // --- JOVEM ---
        function selAv(el) {
            document.querySelectorAll('#avatars span').forEach(s => s.classList.remove('selected'));
            el.classList.add('selected');
            state.avatar = el.textContent;
        }

        function joinGame() {
            const name = document.getElementById('pName').value;
            if(!name) return alert("Insira seu nome!");
            db.ref('rooms/'+roomID+'/players/'+state.myId).set({ name, avatar: state.avatar, score: 0 });
            showView('view-jovem-wait');
        }

        function listenForStart() {
            db.ref('rooms/'+roomID+'/status').on('value', snap => {
                if(snap.val()?.started) {
                    db.ref('rooms/'+roomID+'/quiz').once('value', qSnap => {
                        state.questions = qSnap.val();
                        startQuiz();
                    });
                }
            });
        }

        // --- GAMEPLAY ---
        function startQuiz() {
            showView('view-quiz');
            runQ();
        }

        function runQ() {
            const q = state.questions[state.idx];
            document.getElementById('qNum').textContent = `Questão ${state.idx+1}/10`;
            document.getElementById('qText').textContent = q.q;
            const grid = document.getElementById('qGrid'); grid.innerHTML = '';
            const colors = ['#e21b3c', '#1368ce', '#d89e00', '#26890c'];
            q.opts.forEach((o, i) => {
                grid.innerHTML += `<button class="opt" style="background:${colors[i]}" onclick="vote(${i})">${o}</button>`;
            });

            let t = 25; const bar = document.getElementById('tBar');
            const timer = setInterval(() => {
                t--; bar.style.width = (t/25)*100 + "%";
                if(t <= 0) { clearInterval(timer); reveal(); }
            }, 1000);
            state.activeTimer = timer;
        }

        function vote(i) {
            if(i === state.questions[state.idx].ans) {
                db.ref('rooms/'+roomID+'/players/'+state.myId+'/score').transaction(s => (s || 0) + 100);
            }
            document.querySelectorAll('.opt').forEach(b => b.disabled = true);
        }

        function reveal() {
            const correct = state.questions[state.idx].ans;
            const btns = document.querySelectorAll('.opt');
            btns[correct].classList.add('reveal-correct');
            setTimeout(() => {
                state.idx++;
                if(state.idx < 10) runQ();
                else alert("Fim do Quizz!");
            }, 3500);
        }
    </script>
</body>
</html>
