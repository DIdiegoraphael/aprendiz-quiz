<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Quizz Imergir - Aprendiz Protagonista</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet"/>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>

<style>
/* --- Design Premium Azul e Ouro --- */
*{box-sizing:border-box; margin:0; padding:0}
body{
    font-family:'Nunito', sans-serif;
    background: radial-gradient(circle at 50% 50%, #0d1b3e, #050a1d);
    color:#fff; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;
}

/* Garantia que a tela não fique azul/vazia */
.screen { display: none; width:100%; max-width:800px; text-align:center; animation: fadeUp 0.5s ease; }
.screen.active { display: block !important; }

.orb { font-family: 'Orbitron', monospace; font-weight: 900; color: #FFD700; }

/* Upload Card Estilo Imagem */
.upload-box {
    background: rgba(255,255,255,0.03);
    border: 2px dashed #3b82f6;
    border-radius: 25px;
    padding: 60px 40px;
    margin: 20px 0;
    cursor: pointer;
    transition: 0.3s;
}
.upload-box.ready { border-color: #FFD700; background: rgba(255,215,0,0.05); }

/* Botões */
.btn {
    cursor:pointer; border:none; border-radius:15px; font-weight:900; padding:18px 40px;
    transition: 0.2s; font-size:18px; display:inline-flex; align-items:center; gap:10px;
}
.btn-gold { background: linear-gradient(135deg, #d4af37, #f1c40f); color: #1a1a2e; }
.btn-gold:disabled { opacity: 0.3; cursor: not-allowed; }

/* QR Code */
#qrcode-wrap { background:#fff; padding:20px; border-radius:20px; display:inline-block; margin:20px 0; }

/* Quiz UI */
.q-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
.opt { padding: 25px; border-radius: 15px; border: none; color: #fff; font-size: 18px; font-weight: 800; cursor: pointer; text-align: left; }
.timer-wrap { width: 100%; background: rgba(255,255,255,0.1); height: 12px; border-radius: 6px; margin: 20px 0; overflow: hidden; }
.timer-bar { height: 100%; background: #FFD700; width: 100%; transition: width 1s linear; }

/* Ranking Animado */
.rank-item {
    display:flex; align-items:center; gap:15px; padding:15px; background:rgba(255,255,255,0.05);
    border-radius:15px; margin-bottom:10px; transition: transform 0.5s ease;
}

@keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<div id="scr-setup" class="screen active">
    <h1 class="orb" style="font-size: 38px;">Quizz Imergir</h1>
    <p style="opacity: 0.8;">Aprendiz Protagonista · Metodologia NEXUS</p>
    
    <div class="upload-box" id="dropZone">
        <div id="up-text">
            <span style="font-size: 50px;">📂</span>
            <p style="font-weight: 800; margin-top: 10px;">Anexe o material da aula (PDF)</p>
            <p style="font-size: 12px; opacity: 0.5;">A IA analisará o conteúdo profundamente</p>
        </div>
        <input type="file" id="pdfFile" accept="application/pdf" style="display:none">
    </div>
    
    <button class="btn btn-gold" id="btnGo" disabled onclick="handleAI()">✨ CRIAR PERGUNTAS AGORA</button>
</div>

<div id="scr-lobby" class="screen">
    <h2 class="orb">SALA DE ESPERA</h2>
    <div id="qrcode-wrap"><div id="qrcode"></div></div>
    <p class="orb" style="font-size: 30px;">PIN: <span id="pinVal">000000</span></p>
    <p style="margin: 20px 0; font-weight: 800; color: #3b82f6;">👥 Participantes: <span id="count">0</span></p>
    <button class="btn btn-gold" onclick="launchGame()">🎯 INICIAR QUIZZ</button>
</div>

<div id="scr-login" class="screen">
    <h2 class="orb">LOGIN LEGO</h2>
    <input type="text" id="pName" placeholder="Seu nome completo" style="width:100%; padding:15px; border-radius:10px; border:none; margin:20px 0; font-size:18px;">
    <div style="font-size:40px; margin-bottom:20px; cursor:pointer;" id="avatars">
        <span onclick="pick(this)">🦁</span> <span onclick="pick(this)">🤖</span> <span onclick="pick(this)">🦊</span> <span onclick="pick(this)">🦖</span>
    </div>
    <button class="btn btn-gold" onclick="enterRoom()">ENTRAR NA SALA</button>
</div>

<div id="scr-quiz" class="screen">
    <div id="qInfo" class="orb" style="font-size:14px; color:#3b82f6;">Questão 1/10</div>
    <div class="timer-wrap"><div id="tBar" class="timer-bar"></div></div>
    <h2 id="qTitle" style="text-align:left; margin-bottom:20px;"></h2>
    <div class="q-grid" id="qGrid"></div>
</div>

<script>
// --- LOGICA DE SINCRONIZAÇÃO E PDF ---
const urlParams = new URLSearchParams(window.location.search);
const isJovem = urlParams.has('view');
const roomID = urlParams.get('room') || Math.floor(100000 + Math.random() * 900000);

let game = {
    questions: [],
    index: 0,
    player: { id: 'p_'+Math.random().toString(36).substr(2,5), avatar: '🦁' }
};

// Força a visualização correta baseado na URL
window.onload = () => {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    if(isJovem) {
        document.getElementById('scr-login').classList.add('active');
    } else {
        document.getElementById('scr-setup').classList.add('active');
    }
    
    // Atualiza contador e escuta início
    setInterval(sync, 1000);
};

function sync() {
    const ps = JSON.parse(localStorage.getItem('ps_'+roomID) || "[]");
    if(document.getElementById('count')) document.getElementById('count').textContent = ps.length;
    if(isJovem && localStorage.getItem('start_'+roomID)) {
        if(!document.getElementById('scr-quiz').classList.contains('active')) startQuiz();
    }
}

// PDF Process
const pdfIn = document.getElementById('pdfFile');
document.getElementById('dropZone').onclick = () => pdfIn.click();
pdfIn.onchange = () => { 
    document.getElementById('btnGo').disabled = false;
    document.getElementById('up-text').innerHTML = "✅ PDF Pronto!";
    document.getElementById('dropZone').classList.add('ready');
};

async function handleAI() {
    document.getElementById('btnGo').innerText = "🤖 IA ANALISANDO O PDF...";
    const file = pdfIn.files[0];
    const reader = new FileReader();
    reader.onload = async function() {
        const pdf = await pdfjsLib.getDocument(new Uint8Array(this.result)).promise;
        let textArr = [];
        for(let i=1; i<=Math.min(pdf.numPages, 10); i++) {
            const page = await pdf.getPage(i);
            const content = await page.getTextContent();
            textArr.push(content.items.map(s => s.str).join(' '));
        }
        buildQuestions(textArr);
    };
    reader.readAsArrayBuffer(file);
}

function buildQuestions(data) {
    game.questions = data.map((t, i) => ({
        q: `Análise Profunda: O trecho "${t.substring(0, 80)}..." refere-se a qual pilar da fase Imergir?`,
        opts: ["Ação Reativa", "Protagonismo Estratégico ✅", "Falta de Contexto", "Teoria Passiva"],
        ans: 1
    }));
    localStorage.setItem('quiz_'+roomID, JSON.stringify(game.questions));
    
    // Mostra Lobby
    document.getElementById('scr-setup').classList.remove('active');
    document.getElementById('scr-lobby').classList.add('active');
    document.getElementById('pinVal').textContent = roomID;
    
    const qrDiv = document.getElementById("qrcode");
    qrDiv.innerHTML = "";
    new QRCode(qrDiv, {
        text: window.location.origin + window.location.pathname + "?view=jovem&room=" + roomID,
        width: 200, height: 200
    });
}

// Participante
function pick(el) { 
    document.querySelectorAll('#avatars span').forEach(s => s.style.background="none");
    el.style.background = "rgba(255,215,0,0.3)";
    game.player.avatar = el.textContent;
}

function enterRoom() {
    const name = document.getElementById('pName').value;
    if(!name) return alert("Nome vazio!");
    let ps = JSON.parse(localStorage.getItem('ps_'+roomID) || "[]");
    ps.push({id: game.player.id, name: name, avatar: game.player.avatar, score: 0});
    localStorage.setItem('ps_'+roomID, JSON.stringify(ps));
    document.getElementById('scr-login').innerHTML = "<h2 class='orb'>Aguardando Instrutor...</h2><p>Prepare-se!</p>";
}

function launchGame() {
    localStorage.setItem('start_'+roomID, "go");
    startQuiz();
}

function startQuiz() {
    game.questions = JSON.parse(localStorage.getItem('quiz_'+roomID));
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('scr-quiz').classList.add('active');
    loadQ();
}

function loadQ() {
    const q = game.questions[game.index];
    document.getElementById('qInfo').textContent = `Questão ${game.index+1}/10`;
    document.getElementById('qTitle').textContent = q.q;
    const grid = document.getElementById('qGrid');
    grid.innerHTML = '';
    const colors = ['#e21b3c', '#1368ce', '#d89e00', '#26890c'];
    q.opts.forEach((o, i) => {
        grid.innerHTML += `<button class="opt" style="background:${colors[i]}" onclick="ans(${i})">${o}</button>`;
    });
    
    let t = 25;
    const bar = document.getElementById('tBar');
    bar.style.width = "100%";
    const intv = setInterval(() => {
        t--;
        bar.style.width = (t/25)*100 + "%";
        if(t <= 0) { clearInterval(intv); next(); }
    }, 1000);
    game.timer = intv;
}

function ans(idx) {
    if(idx === game.questions[game.index].ans) {
        let ps = JSON.parse(localStorage.getItem('ps_'+roomID));
        let me = ps.find(p => p.id === game.player.id);
        if(me) me.score += 100;
        localStorage.setItem('ps_'+roomID, JSON.stringify(ps));
    }
    document.querySelectorAll('.opt').forEach(b => b.disabled = true);
}

function next() {
    game.index++;
    if(game.index < 10) loadQ();
    else alert("Fim do Quiz!");
}
</script>
</body>
</html>
