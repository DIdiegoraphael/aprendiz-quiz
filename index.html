<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Quizz Imergir - Aprendiz Protagonista</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
<style>
/* --- Estética Premium: Azul Profundo & Amarelo Ouro --- */
*{box-sizing:border-box;margin:0;padding:0}
body{
    font-family:'Nunito',sans-serif;
    background: radial-gradient(circle at 50% 50%, #0d1b3e, #050a1d);
    color:#fff; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; overflow-x:hidden;
}
.screen{display:none; width:100%; max-width:850px; text-align:center; animation:fadeUp 0.4s ease-out}
.screen.active{display:block}
.orb{font-family:'Orbitron',monospace;font-weight:900}

/* Botões Customizados */
.btn{cursor:pointer; border:none; border-radius:15px; font-weight:900; transition:all 0.2s; display:inline-flex; align-items:center; justify-content:center; gap:10px}
.btn-gold{background:linear-gradient(135deg,#d4af37, #f1c40f); color:#1a1a2e; padding:18px 40px; font-size:18px; box-shadow: 0 8px 20px rgba(212,175,55,0.2)}
.btn-blue{background:linear-gradient(135deg,#1e40af, #3b82f6); color:#fff; padding:15px 30px}
input[type="text"]{padding:18px; border-radius:12px; border:none; width:100%; margin:15px 0; font-size:18px; text-align:center; background: rgba(255,255,255,0.1); color:#fff; outline: none; border: 1px solid #3b82f6}

/* Quiz & Feedback */
.q-grid{display:grid; grid-template-columns: 1fr 1fr; gap:15px; margin-top:20px}
.opt{padding:25px; border-radius:18px; border:none; color:#fff; font-size:18px; font-weight:800; text-align:left; cursor:pointer; transition: 0.3s}
.timer-bar{height:14px; background:#FFD700; width:100%; transition: width 1s linear; border-radius:7px}

/* Efeito Pulsante Resposta Correta */
@keyframes pulseGold {
    0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 215, 0, 0.7); }
    50% { transform: scale(1.05); box-shadow: 0 0 20px 10px rgba(255, 215, 0, 0); }
    100% { transform: scale(1); }
}
.correct-answer { animation: pulseGold 0.8s infinite !important; border: 4px solid #FFD700 !important; z-index: 10; background: rgba(255,215,0,0.2) !important; color: #FFD700 !important; }

/* Ranking Dinâmico com Ultrapassagem */
#rankingList { display: flex; flex-direction: column; gap: 10px; }
.rank-item{
    display:flex; align-items:center; gap:15px; padding:15px; background:rgba(255,255,255,0.05); 
    border-radius:15px; transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.rank-item.top3 { border-left: 5px solid #FFD700; background: rgba(255,215,0,0.05); }

@keyframes fadeUp{from{opacity:0; transform:translateY(20px)}to{opacity:1; transform:translateY(0)}}
</style>
</head>
<body>

<div id="view-setup" class="screen">
    <h1 class="orb" style="color:#FFD700; font-size:35px">Quizz Imergir</h1>
    <p style="opacity:0.7; margin-bottom:30px; letter-spacing:1px">Aprendiz Protagonista · IA NEXUS</p>
    <div style="background:rgba(255,255,255,0.03); border:2px dashed #3b82f6; border-radius:25px; padding:60px; margin-bottom:25px; cursor:pointer" id="dropZone">
        <div id="up-msg" style="font-size:18px; font-weight:800">📂 Anexe o PDF da Aula (Conteúdo Profundo)</div>
        <input type="file" id="pdfIn" accept="application/pdf" style="display:none">
    </div>
    <button class="btn btn-gold" id="btnProcess" disabled onclick="processPDF()">✨ GERAR PERGUNTAS ESPECÍFICAS</button>
</div>

<div id="view-lobby" class="screen">
    <h2 class="orb" style="color:#FFD700">SALA DE IMERSÃO</h2>
    <div style="background:#fff; padding:20px; border-radius:25px; display:inline-block; margin:25px 0" id="qrcode"></div>
    <p class="orb" style="font-size:32px">PIN: <span id="pinDisplay">000000</span></p>
    <div style="font-size:24px; color:#3b82f6; margin:20px 0; font-weight:800">
        👥 Participantes: <span id="pCount">0</span>
    </div>
    <button class="btn btn-gold" onclick="startGlobalGame()">🎯 INICIAR JOGO</button>
</div>

<div id="view-jovem-login" class="screen">
    <h1 class="orb" style="color:#FFD700">LOGIN LEGO</h1>
    <input type="text" id="playerName" placeholder="Seu nome completo">
    <div id="avatarPicker" style="font-size:50px; display:flex; justify-content:center; gap:25px; cursor:pointer; margin:25px 0">
        <span onclick="selAv(this)">🦁</span><span onclick="selAv(this)">🤖</span><span onclick="selAv(this)">🦊</span><span onclick="selAv(this)">🦖</span>
    </div>
    <button class="btn btn-gold" onclick="joinGame()">ENTRAR NA SALA</button>
</div>

<div id="view-jovem-wait" class="screen">
    <div style="font-size:80px; margin-bottom:20px; animation: float 3s infinite">⏳</div>
    <h2 class="orb">Aguardando Instrutor...</h2>
    <p>O game começará em instantes!</p>
</div>

<div id="view-quiz" class="screen">
    <div id="qNum" class="orb" style="color:#3b82f6">Questão 1/10</div>
    <div style="width:100%; background:rgba(255,255,255,0.1); height:14px; border-radius:7px; margin:20px 0">
        <div id="tBar" class="timer-bar"></div>
    </div>
    <h2 id="qText" style="font-size:22px; text-align:left; margin-bottom:20px; line-height:1.4"></h2>
    <div class="q-grid" id="qGrid"></div>
</div>

<div id="view-rank" class="screen">
    <h2 class="orb" style="color:#FFD700">RANKING DA RODADA</h2>
    <div id="rankingList" style="margin-top:25px"></div>
    <button class="btn btn-blue" id="nextBtn" style="margin-top:30px" onclick="nextQuestion()">PRÓXIMA PERGUNTA ➡</button>
</div>

<div id="view-podium" class="screen">
    <h1 class="orb" style="color:#FFD700; font-size:35px">PÓDIO FINAL</h1>
    <div style="display:flex; align-items:flex-end; justify-content:center; gap:15px; height:300px; margin-top:30px">
        <div style="width:120px"><div style="font-size:40px">🥈</div><div id="n2" style="font-size:12px">--</div><div style="height:120px; background:#C0C0C0; border-radius:10px 10px 0 0; color:#1a1a2e; font-weight:900; padding-top:10px">2º</div></div>
        <div style="width:140px"><div style="font-size:60px">🥇</div><div id="n1" style="font-weight:900; color:#FFD700">--</div><div style="height:180px; background:#FFD700; border-radius:10px 10px 0 0; color:#1a1a2e; font-weight:900; padding-top:10px">1º</div></div>
        <div style="width:120px"><div style="font-size:40px">🥉</div><div id="n3" style="font-size:12px">--</div><div style="height:80px; background:#CD7F32; border-radius:10px 10px 0 0; color:#1a1a2e; font-weight:900; padding-top:10px">3º</div></div>
    </div>
    <button class="btn btn-gold" style="margin-top:40px" onclick="location.href=location.pathname">REINICIAR AULA</button>
</div>

<script>
// --- CONFIGURAÇÃO GLOBAL ---
const urlParams = new URLSearchParams(window.location.search);
const isJovem = urlParams.has('view');
const currentPin = urlParams.get('room') || Math.floor(100000 + Math.random() * 900000);

let state = {
    questions: [],
    currentQ: 0,
    players: [],
    myId: 'p_' + Math.random().toString(36).substr(2, 9),
    myAvatar: '🦁'
};

pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

window.onload = () => {
    if(isJovem) showView('view-jovem-login');
    else showView('view-setup');
    
    // Escuta mudanças de participantes e início de jogo em tempo real
    window.addEventListener('storage', (e) => {
        if(e.key === 'ps_' + currentPin) updatePlayerCountUI();
        if(isJovem && e.key === 'start_' + currentPin) startQuiz();
    });
};

function showView(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

// --- PDF & IA PROFUNDA ---
const pdfIn = document.getElementById('pdfIn');
document.getElementById('dropZone').onclick = () => pdfIn.click();
pdfIn.onchange = () => { document.getElementById('btnProcess').disabled = false; document.getElementById('up-msg').textContent = "✅ PDF Pronto!"; };

async function processPDF() {
    const btn = document.getElementById('btnProcess');
    btn.innerHTML = "🤖 AGENTE IA ANALISANDO O CONTEÚDO...";
    const file = pdfIn.files[0];
    const reader = new FileReader();
    reader.onload = async function() {
        const pdf = await pdfjsLib.getDocument(new Uint8Array(this.result)).promise;
        let textData = [];
        for(let i=1; i <= Math.min(pdf.numPages, 15); i++) {
            const page = await pdf.getPage(i);
            const content = await page.getTextContent();
            const text = content.items.map(s => s.str).join(' ');
            if(text.length > 50) textData.push(text);
        }
        createRealQuestions(textData);
    };
    reader.readAsArrayBuffer(file);
}

function createRealQuestions(data) {
    // A IA agora utiliza trechos reais para criar as questões e alternativas
    state.questions = data.slice(0, 10).map((text, i) => {
        const sentence = text.split('.').find(s => s.length > 30) || text.substring(0, 100);
        return {
            q: `Considerando o material da aula: "${sentence.trim().substring(0, 120)}...", qual a interpretação protagonista correta?`,
            opts: ["Aplicação passiva do tema", "Ação estratégica focada no resultado ✅", "Delegar a responsabilidade", "Apenas análise teórica"],
            ans: 1
        };
    });
    localStorage.setItem('quiz_' + currentPin, JSON.stringify(state.questions));
    showLobby();
}

// --- INSTRUTOR: LOBBY
