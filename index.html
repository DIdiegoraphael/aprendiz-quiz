<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quizz Imergir - Aprendiz Protagonista</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        /* --- Design Premium: Azul Marinho & Ouro --- */
        *{box-sizing:border-box; margin:0; padding:0}
        body{
            font-family:'Nunito', sans-serif;
            background: radial-gradient(circle at 50% 50%, #0d1b3e, #050a1d);
            color:#fff; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; overflow:hidden;
        }
        .screen { display: none; width:100%; max-width:850px; text-align:center; animation: fadeUp 0.4s ease; }
        .screen.active { display: block !important; }
        .orb { font-family: 'Orbitron', monospace; font-weight: 900; color: #FFD700; text-transform: uppercase; }

        .btn { cursor:pointer; border:none; border-radius:18px; font-weight:900; padding:18px 45px; transition: 0.2s; font-size:18px; display:inline-flex; align-items:center; gap:10px; }
        .btn-gold { background: linear-gradient(135deg, #d4af37, #f1c40f); color: #1a1a2e; box-shadow: 0 8px 25px rgba(212,175,55,0.3); }
        .btn-blue { background: linear-gradient(135deg, #1e40af, #3b82f6); color: #fff; }

        .upload-box { background: rgba(255,255,255,0.03); border: 2px dashed #3b82f6; border-radius: 30px; padding: 40px; margin: 25px 0; cursor: pointer; }
        .upload-box.ready { border-color: #FFD700; background: rgba(255,215,0,0.05); }

        #qrcode-container { background:#fff; padding:20px; border-radius:20px; display:inline-block; margin:20px 0; border: 5px solid #FFD700; }

        .q-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 25px; }
        .opt { padding: 30px; border-radius: 20px; border: 2px solid rgba(255,255,255,0.1); color: #fff; font-size: 20px; font-weight: 800; cursor: pointer; text-align: left; transition: 0.3s; }
        .timer-bar { height: 15px; background: #FFD700; width: 100%; transition: width 1s linear; border-radius: 10px; margin: 20px 0; }

        @keyframes vibrateCorrect {
            0%, 100% { transform: scale(1.05); border-color: #FFD700; box-shadow: 0 0 25px #FFD700; }
            25% { transform: scale(1.05) rotate(2deg); }
            75% { transform: scale(1.05) rotate(-2deg); }
        }
        .reveal-correct { animation: vibrateCorrect 0.15s infinite !important; background: #26890c !important; border: 3px solid #fff !important; }

        .rank-item { display: flex; align-items: center; gap: 15px; padding: 15px; background: rgba(255,255,255,0.05); border-radius: 15px; margin-bottom: 12px; }
        .rank-item.top { border-left: 5px solid #FFD700; background: rgba(255,215,0,0.1); }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="scr-setup" class="screen active">
        <h1 class="orb" style="font-size: 35px;">Quizz Imergir</h1>
        <p style="opacity: 0.8; letter-spacing: 2px;">Aprendiz Protagonista · Excelência</p>
        <div class="upload-box" id="dropZone">
            <span style="font-size: 55px;">📂</span>
            <p style="font-weight: 800; font-size: 20px; margin-top: 15px;">Anexe o PDF com as perguntas</p>
            <input type="file" id="pdfIn" accept="application/pdf" style="display:none">
        </div>
        <button class="btn btn-gold" id="btnGo" disabled onclick="handleAI()">✨ GERAR DESAFIO REAL-TIME</button>
    </div>

    <div id="scr-lobby" class="screen">
        <h2 class="orb">SALA DE ESPERA</h2>
        <div id="qrcode-container"><div id="qrcode"></div></div>
        <p class="orb" style="font-size: 30px;">PIN: <span id="pinVal">AULA-PRO</span></p>
        <div style="background: #1e40af; padding: 15px 35px; border-radius: 40px; margin: 20px 0; border: 2px solid #FFD700;">
            <span style="font-weight: 900; font-size: 20px;">👥 Participantes: <span id="pCount">0</span></span>
        </div><br>
        <button class="btn btn-gold" onclick="launchGame()">🎯 INICIAR QUIZZ NO CELULAR DE TODOS</button>
    </div>

    <div id="scr-login" class="screen">
        <h1 class="orb">LOGIN LEGO</h1>
        <input type="text" id="pName" placeholder="Seu Nome Completo" style="width:100%; padding:18px; border-radius:15px; border:none; margin-bottom:20px; font-size:20px; text-align:center;">
        <div id="avatars" style="font-size:55px; margin-bottom:25px; cursor:pointer;">
            <span onclick="selAv(this)">🦁</span> <span onclick="selAv(this)">🤖</span> <span onclick="selAv(this)">🦊</span> <span onclick="selAv(this)">🦖</span>
        </div>
        <button class="btn btn-gold" onclick="joinGame()">ENTRAR NA SALA</button>
    </div>

    <div id="scr-wait" class="screen">
        <div style="font-size:100px; margin-bottom:30px;">⏳</div>
        <h2 class="orb">Você está dentro!</h2>
        <p>Aguarde o Instrutor iniciar o desafio.</p>
    </div>

    <div id="scr-quiz" class="screen">
        <div id="qNum" class="orb" style="color:#3b82f6; font-size: 20px;">Questão 1/10</div>
        <div style="width:100%; background:rgba(255,255,255,0.1); height:16px; border-radius:10px; margin: 20px 0; overflow:hidden;">
            <div id="tBar" class="timer-bar"></div>
        </div>
        <h2 id="qText" style="text-align:left; font-size: 24px; margin-bottom: 30px;"></h2>
        <div class="q-grid" id="qGrid"></div>
    </div>

    <div id="scr-rank" class="screen">
        <h2 class="orb" style="margin-bottom: 30px;">CLASSIFICAÇÃO</h2>
        <div id="rankList" style="max-width: 600px; margin: 0 auto;"></div>
        <button class="btn btn-blue" id="btnNext" style="margin-top: 30px;" onclick="nextStep()">PRÓXIMA PERGUNTA</button>
    </div>

    <script>
        // --- CONFIGURAÇÃO FIREBASE (COLE SEUS DADOS AQUI) ---
        const firebaseConfig = {
            apiKey: "COLE_AQUI",
            authDomain: "COLE_AQUI",
            databaseURL: "COLE_AQUI",
            projectId: "COLE_AQUI",
            storageBucket: "COLE_AQUI",
            messagingSenderId: "COLE_AQUI",
            appId: "COLE_AQUI"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const urlParams = new URLSearchParams(window.location.search);
        const isJovem = urlParams.has('view');
        const roomID = urlParams.get('room') || "AULA-PRO";

        let state = { questions: [], idx: 0, players: [], myId: 'p'+Math.random().toString(36).substr(2,5), avatar: '🦁', timer: null };

        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        window.onload = () => {
            if(isJovem) {
                showView('scr-login');
                listenToGameStart();
            } else {
                showView('scr-setup');
                listenToPlayers();
            }
        };

        function showView(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // --- LÓGICA DO INSTRUTOR ---
        function listenToPlayers() {
            db.ref('rooms/' + roomID + '/players').on('value', (snap) => {
                const data = snap.val() || {};
                state.players = Object.values(data);
                document.getElementById('pCount').textContent = state.players.length;
            });
        }

        const pdfIn = document.getElementById('pdfIn');
        document.getElementById('dropZone').onclick = () => pdfIn.click();
        pdfIn.onchange = () => { document.getElementById('btnGo').disabled = false; document.getElementById('dropZone').classList.add('ready'); };

        async function handleAI() {
            const pdf = await pdfjsLib.getDocument(new Uint8Array(await pdfIn.files[0].arrayBuffer())).promise;
            let text = "";
            for(let i=1; i<=pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const content = await page.getTextContent();
                text += content.items.map(s => s.str).join(' ') + " ";
            }
            // IA Simplificada para o PDF
            const questions = text.match(/[A-Z][^.!?]*\?/g) || ["Pergunta baseada no PDF?"];
            state.questions = Array.from({length: 10}, (_, i) => ({
                q: questions[i] || `Questão técnica ${i+1} do conteúdo analisado?`,
                opts: ["Opção Incorreta", "Alternativa Correta ✅", "Distrator 1", "Distrator 2"],
                ans: 1
            }));
            showLobby();
        }

        function showLobby() {
            showView('scr-lobby');
            document.getElementById('pinVal').textContent = roomID;
            const qrUrl = window.location.origin + window.location.pathname + "?view=jovem&room=" + roomID;
            new QRCode(document.getElementById("qrcode"), { text: qrUrl, width: 220, height: 220 });
        }

        function launchGame() {
            db.ref('rooms/' + roomID + '/gameStatus').set({ started: true, questions: state.questions, timestamp: Date.now() });
            startQuiz();
        }

        // --- LÓGICA DO ALUNO ---
        function listenToGameStart() {
            db.ref('rooms/' + roomID + '/gameStatus').on('value', (snap) => {
                const data = snap.val();
                if (data && data.started && !state.gameStarted) {
                    state.gameStarted = true;
                    state.questions = data.questions;
                    startQuiz();
                }
            });
        }

        function selAv(el) {
            document.querySelectorAll('#avatars span').forEach(s => s.style.border="none");
            el.style.border = "4px solid #FFD700";
            state.avatar = el.textContent;
        }

        function joinGame() {
            const name = document.getElementById('pName').value;
            if(!name) return alert("Nome necessário!");
            db.ref('rooms/' + roomID + '/players/' + state.myId).set({ id: state.myId, name: name, avatar: state.avatar, score: 0 });
            showView('scr-wait');
        }

        // --- GAMEPLAY COMUM ---
        function startQuiz() {
            showView('scr-quiz');
            runQuestion();
        }

        function runQuestion() {
            const q = state.questions[state.idx];
            document.getElementById('qNum').textContent = `Questão ${state.idx+1}/10`;
            document.getElementById('qText').textContent = q.q;
            const grid = document.getElementById('qGrid'); grid.innerHTML = '';
            const colors = ['#e21b3c', '#1368ce', '#d89e00', '#26890c'];
            q.opts.forEach((o, i) => {
                grid.innerHTML += `<button class="opt" style="background:${colors[i]}" onclick="vote(${i})">${o}</button>`;
            });

            let t = 25; const bar = document.getElementById('tBar');
            bar.style.width = "100%";
            clearInterval(state.timer);
            state.timer = setInterval(() => {
                t--; bar.style.width = (t/25)*100 + "%";
                if(t <= 0) reveal();
            }, 1000);
        }

        function vote(i) {
            const q = state.questions[state.idx];
            if(i === q.ans) {
                db.ref('rooms/' + roomID + '/players/' + state.myId + '/score').transaction(s => (s || 0) + 100);
            }
            document.querySelectorAll('.opt').forEach(b => b.disabled = true);
        }

        function reveal() {
            clearInterval(state.timer);
            const q = state.questions[state.idx];
            const btns = document.querySelectorAll('.opt');
            if(btns[q.ans]) btns[q.ans].classList.add('reveal-correct');
            setTimeout(() => { showRanking(); }, 3500);
        }

        function showRanking() {
            showView('scr-rank');
            const list = document.getElementById('rankList');
            db.ref('rooms/' + roomID + '/players').once('value', (snap) => {
                const ps = Object.values(snap.val() || {}).sort((a,b) => b.score - a.score);
                list.innerHTML = ps.map((p, i) => `
                    <div class="rank-item ${i < 3 ? 'top' : ''}">
                        <span class="orb">${i+1}º</span>
                        <span style="font-size:25px;">${p.avatar}</span>
                        <span style="flex:1; text-align:left; font-weight:800;">${p.name}</span>
                        <span class="orb">${p.score}</span>
                    </div>
                `).join('');
            });
        }

        function nextStep() {
            state.idx++;
            if(state.idx < 10) runQuestion();
            else alert("Fim do Quizz!");
        }
    </script>
</body>
</html>
