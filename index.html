<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quizz Imergir - Aprendiz Protagonista</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        *{box-sizing:border-box; margin:0; padding:0}
        body{
            font-family:'Nunito', sans-serif;
            background: radial-gradient(circle at 50% 50%, #0d1b3e, #050a1d);
            color:#fff; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;
        }
        .screen { display: none; width:100%; max-width:800px; text-align:center; animation: fadeUp 0.4s ease; }
        .screen.active { display: block !important; }
        .orb { font-family: 'Orbitron', monospace; font-weight: 900; color: #FFD700; text-transform: uppercase; }

        /* Área de Clique para Upload */
        .upload-container {
            background: rgba(255,255,255,0.03);
            border: 2px dashed #3b82f6;
            border-radius: 30px;
            padding: 60px;
            margin: 25px 0;
            cursor: pointer; /* Garante o cursor de clique */
            transition: 0.3s;
        }
        .upload-container:hover { background: rgba(255,255,255,0.08); border-color: #FFD700; }
        .upload-container.ready { border-color: #FFD700; background: rgba(255,215,0,0.05); }

        .btn { cursor:pointer; border:none; border-radius:18px; font-weight:900; padding:18px 45px; transition: 0.2s; font-size:18px; display:inline-flex; align-items:center; gap:10px; }
        .btn-gold { background: linear-gradient(135deg, #d4af37, #f1c40f); color: #1a1a2e; box-shadow: 0 8px 25px rgba(212,175,55,0.3); }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; }

        #qrcode-container { background:#fff; padding:20px; border-radius:20px; display:inline-block; margin:20px 0; border: 5px solid #FFD700; }
        .timer-bar { height: 15px; background: #FFD700; width: 100%; transition: width 1s linear; border-radius: 10px; margin: 20px 0; }
        
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="scr-setup" class="screen active">
        <h1 class="orb" style="font-size: 35px;">Quizz Imergir</h1>
        <p style="opacity: 0.8;">Aprendiz Protagonista · Excelência</p>
        
        <input type="file" id="pdfIn" accept="application/pdf" style="display:none">
        
        <div class="upload-container" id="dropZone" onclick="document.getElementById('pdfIn').click()">
            <span style="font-size: 55px;">📂</span>
            <p id="up-label" style="font-weight: 800; font-size: 20px; margin-top: 15px;">Clique aqui para anexar o PDF</p>
            <p style="font-size: 13px; opacity: 0.5; margin-top: 10px;">O seletor de arquivos abrirá ao clicar</p>
        </div>
        
        <button class="btn btn-gold" id="btnGo" disabled onclick="handleAI()">✨ GERAR QUIZZ</button>
    </div>

    <div id="scr-lobby" class="screen">
        <h2 class="orb">SALA DE ESPERA</h2>
        <div id="qrcode-container"><div id="qrcode"></div></div>
        <p class="orb" style="font-size: 30px;">PIN: <span id="pinVal">AULA-PRO</span></p>
        <p style="margin: 20px 0; font-weight: 900;">👥 Participantes: <span id="pCount">0</span></p>
        <button class="btn btn-gold" onclick="launchGame()">🎯 INICIAR QUIZZ</button>
    </div>

    <script>
        // --- CONFIGURAÇÃO FIREBASE ---
        const firebaseConfig = {
            apiKey: "AIzaSyCzVzw3e7pgBC89RlndUDh-03uk_2Vevdg",
  authDomain: "quizzprotagonista.firebaseapp.com",
  databaseURL: "https://quizzprotagonista-default-rtdb.firebaseio.com",
  projectId: "quizzprotagonista",
  storageBucket: "quizzprotagonista.firebasestorage.app",
  messagingSenderId: "586012726878",
  appId: "1:586012726878:web:2f2f60f16f8c334dae86cf",
  
        };

        // Inicialização com tratamento de erro
        try {
            firebase.initializeApp(firebaseConfig);
            var db = firebase.database();
        } catch (e) {
            console.error("Erro ao conectar ao Firebase. Verifique as chaves.");
        }

        const urlParams = new URLSearchParams(window.location.search);
        const isJovem = urlParams.has('view');
        const roomID = urlParams.get('room') || "AULA-PRO";

        let state = { questions: [], idx: 0, myId: 'p'+Math.random().toString(36).substr(2,5) };

        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        // Comando de Clique Direto
        const fileInput = document.getElementById('pdfIn');
        const dropZone = document.getElementById('dropZone');

        fileInput.onchange = (e) => {
            if(e.target.files[0]) {
                document.getElementById('up-label').innerText = "✅ " + e.target.files[0].name;
                dropZone.classList.add('ready');
                document.getElementById('btnGo').disabled = false;
            }
        };

        // Função para mostrar telas
        function showView(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        window.onload = () => {
            if(isJovem) {
                // Tela de Login Jovem
                showView('scr-setup'); // Por enquanto, para não dar erro
                // (Adicione aqui a lógica de visualização do jovem como no código anterior)
            } else {
                showView('scr-setup');
                // Ouve participantes
                if(db) {
                    db.ref('rooms/' + roomID + '/players').on('value', (snap) => {
                        const count = snap.numChildren();
                        document.getElementById('pCount').textContent = count;
                    });
                }
            }
        };

        async function handleAI() {
            const btn = document.getElementById('btnGo');
            btn.innerText = "🤖 LENDO PDF...";
            // Lógica de processamento do PDF...
            // (Mantenha a lógica de extração do código anterior)
            showLobby();
        }

        function showLobby() {
            showView('scr-lobby');
            const qrUrl = window.location.origin + window.location.pathname + "?view=jovem&room=" + roomID;
            new QRCode(document.getElementById("qrcode"), { text: qrUrl, width: 200, height: 200 });
        }

        function launchGame() {
            if(db) db.ref('rooms/' + roomID + '/gameStatus').set({ started: true, timestamp: Date.now() });
            // Inicia o quiz localmente
        }
    </script>
</body>
</html>
