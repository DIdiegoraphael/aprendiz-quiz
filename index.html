<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quizz Imergir</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        *{box-sizing:border-box; margin:0; padding:0}
        body{ font-family:'Nunito', sans-serif; background:#050a1d; color:#fff; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
        .screen { display: none; width:100%; max-width:700px; text-align:center; }
        .screen.active { display: block !important; }
        .orb { font-family: 'Orbitron', sans-serif; font-weight: 900; color: #FFD700; }
        .btn { cursor:pointer; border:none; border-radius:15px; font-weight:900; padding:18px 40px; font-size:18px; background: linear-gradient(135deg, #d4af37, #f1c40f); color: #1a1a2e; margin-top:20px; }
        .timer-container { width: 100%; background: rgba(255,255,255,0.1); height: 20px; border-radius: 10px; margin: 20px 0; overflow: hidden; border: 2px solid #FFD700; }
        #tBar { height: 100%; background: #FFD700; width: 100%; transition: width 1s linear; }
        .q-grid { display: grid; grid-template-columns: 1fr; gap: 10px; margin-top: 20px; }
        .opt { padding: 20px; border-radius: 15px; border: none; color: #fff; font-size: 18px; font-weight: 700; cursor: pointer; text-align: left; }
        .correct { background: #26890c !important; border: 3px solid #fff !important; animation: pulse 0.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }
        .rank-card { display: flex; justify-content: space-between; padding: 15px; background: rgba(255,255,255,0.05); border-radius: 10px; margin-bottom: 8px; border-left: 4px solid #FFD700; }
    </style>
</head>
<body>

    <div id="scr-lobby" class="screen active">
        <h1 class="orb">QUIZZ IMERGIR</h1>
        <div id="qrcode" style="background:#fff; padding:10px; border-radius:10px; display:inline-block; margin:20px 0;"></div>
        <p style="font-size: 20px; margin-bottom: 10px;">Acesse pelo QR Code ou Link</p>
        <input type="text" id="pName" placeholder="Seu Nome" style="padding:15px; border-radius:10px; width:80%; border:none; text-align:center; margin-bottom:10px;"><br>
        <button class="btn" onclick="register()">ENTRAR NO JOGO</button>
        <div id="admin-area" style="margin-top:30px; border-top:1px solid rgba(255,255,255,0.1); padding-top:20px;">
            <p>Aguardando: <b id="pCount">0</b> participantes</p>
            <button class="btn" onclick="startQuiz()">INICIAR QUIZZ (Instrutor)</button>
        </div>
    </div>

    <div id="scr-quiz" class="screen">
        <h2 id="qTitle" class="orb" style="font-size:20px; margin-bottom:10px;">Questão</h2>
        <div class="timer-container"><div id="tBar"></div></div>
        <h3 id="qText" style="font-size:22px; margin-bottom:20px; text-align:left;"></h3>
        <div class="q-grid" id="qGrid"></div>
    </div>

    <div id="scr-rank" class="screen">
        <h2 class="orb" style="margin-bottom:20px;">RANKING</h2>
        <div id="rankList"></div>
        <button class="btn" onclick="nextQuestion()">PRÓXIMA QUESTÃO</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCzVzw3e7pgBC89RlndUDh-03uk_2Vevdg",
            authDomain: "quizzprotagonista.firebaseapp.com",
            databaseURL: "https://quizzprotagonista-default-rtdb.firebaseio.com",
            projectId: "quizzprotagonista",
            storageBucket: "quizzprotagonista.firebasestorage.app",
            messagingSenderId: "586012726878",
            appId: "1:586012726878:web:2f2f60f16f8c334dae86cf"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const room = "SALA_DEFINITIVA";

        // --- SUAS QUESTÕES AQUI: COPIE E COLE DO SEU PDF ---
        const questoes = [
            {
                q: "Qual a primeira pergunta do seu PDF?",
                opts: ["Resposta A", "Resposta B (Correta)", "Resposta C", "Resposta D"],
                ans: 1 // 0=A, 1=B, 2=C, 3=D
            },
            {
                q: "Qual a segunda pergunta do seu PDF?",
                opts: ["Opção 1", "Opção 2", "Opção 3 (Correta)", "Opção 4"],
                ans: 2
            },
            // Pode adicionar quantas quiser seguindo este formato
        ];

        let state = { idx: 0, myId: 'p'+Date.now(), score: 0, timer: null };

        window.onload = () => {
            new QRCode(document.getElementById("qrcode"), { text: window.location.href, width: 150, height: 150 });
            db.ref('rooms/'+room+'/players').on('value', s => {
                document.getElementById('pCount').textContent = s.numChildren();
            });
            db.ref('rooms/'+room+'/status').on('value', s => {
                if(s.val()?.started) loadQuiz();
            });
        };

        function register() {
            const name = document.getElementById('pName').value;
            if(!name) return alert("Digite seu nome!");
            db.ref('rooms/'+room+'/players/'+state.myId).set({ name: name, score: 0 });
            document.getElementById('scr-lobby').innerHTML = "<h1>Conectado!</h1><p>Olhe para a tela do instrutor.</p>";
        }

        function startQuiz() {
            db.ref('rooms/'+room+'/status').set({ started: true });
        }

        function loadQuiz() {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('scr-quiz').classList.add('active');
            const q = questoes[state.idx];
            document.getElementById('qTitle').textContent = `Questão ${state.idx+1}/${questoes.length}`;
            document.getElementById('qText').textContent = q.q;
            const grid = document.getElementById('qGrid');
            grid.innerHTML = '';
            const colors = ['#e21b3c', '#1368ce', '#d89e00', '#26890c'];
            q.opts.forEach((o, i) => {
                grid.innerHTML += `<button class="opt" style="background:${colors[i]}" onclick="vote(${i})">${o}</button>`;
            });

            let t = 20;
            const bar = document.getElementById('tBar');
            bar.style.width = "100%";
            state.timer = setInterval(() => {
                t--;
                bar.style.width = (t/20)*100 + "%";
                if(t <= 0) { clearInterval(state.timer); reveal(); }
            }, 1000);
        }

        function vote(i) {
            if(i === questoes[state.idx].ans) state.score += 100;
            document.querySelectorAll('.opt').forEach(b => b.disabled = true);
        }

        function reveal() {
            const correct = questoes[state.idx].ans;
            document.querySelectorAll('.opt')[correct].classList.add('correct');
            db.ref('rooms/'+room+'/players/'+state.myId+'/score').set(state.score);
            setTimeout(showRank, 3000);
        }

        function showRank() {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('scr-rank').classList.add('active');
            db.ref('rooms/'+room+'/players').once('value', s => {
                const ps = Object.values(s.val() || {}).sort((a,b) => b.score - a.score);
                document.getElementById('rankList').innerHTML = ps.map(p => `
                    <div class="rank-card"><span>${p.name}</span><span>${p.score} pts</span></div>
                `).join('');
            });
        }

        function nextQuestion() {
            state.idx++;
            if(state.idx < questoes.length) loadQuiz(); else alert("Fim!");
        }
    </script>
</body>
</html>
